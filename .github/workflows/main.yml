name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [csharp, python]
        version: [V1, V2]

    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup for .NET (C#)
    - name: Setup .NET
      if: matrix.language == 'csharp'
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # Restore C# dependencies
    - name: Restore dependencies (C#)
      if: matrix.language == 'csharp'
      run: dotnet restore ./${{ matrix.version }}/tests/tests.csproj

    # Build C# application
    - name: Build solution
      if: matrix.language == 'csharp'
      run: dotnet build ./${{ matrix.version }}/tests/tests.csproj --configuration Release --no-restore

    # Run MSTest with Coverage
    - name: Run MSTest with Coverage
      if: matrix.language == 'csharp'
      run: |
        dotnet test ./${{ matrix.version }}/tests/tests.csproj --configuration Release --verbosity detailed \
          --collect:"XPlat Code Coverage" \
          --results-directory TestResults \
          /p:CollectCoverage=true /p:CoverletOutput=TestResults/coverage-results/ /p:CoverletOutputFormat=cobertura
      continue-on-error: true

    # Debug TestResults Directory (C#)
    - name: Debug TestResults Directory
      if: matrix.language == 'csharp'
      run: |
        echo "Listing TestResults directory:"
        ls -R TestResults

    # Install ReportGenerator for C# Coverage
    - name: Install ReportGenerator
      if: matrix.language == 'csharp'
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Generate Coverage Report for C#
    - name: Generate Coverage Report
      if: matrix.language == 'csharp'
      run: |
        reportgenerator -reports:"TestResults/**/*.xml" \
                        -targetdir:"coverage-report-${{ matrix.version }}" \
                        -reporttypes:"HtmlInline_AzurePipelines;Cobertura"
      env:
        PATH: $PATH:/home/runner/.dotnet/tools

    # Upload C# Coverage Report
    - name: Upload Coverage Report
      if: matrix.language == 'csharp'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.version }}
        path: coverage-report-${{ matrix.version }}

    # Setup for Python
    - name: Set up Python
      if: matrix.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Install Python dependencies
    - name: Install Python dependencies
      if: matrix.language == 'python'
      run: pip install -r PythonTests/requirements.txt

    # Run Python tests
    - name: Run Python Tests
      if: matrix.language == 'python'
      run: |
        python -m unittest discover PythonTests/
